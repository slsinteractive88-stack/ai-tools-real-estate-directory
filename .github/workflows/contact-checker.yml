name: Contact Form Checker

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch: {}

jobs:
  check-contact-form:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Check for new contact form submissions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          NOTIFY_WEBHOOK: ${{ secrets.CONTACT_NOTIFY_WEBHOOK }}
        run: npx tsx scripts/check-contact-form.ts