name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate listings
        run: npx tsx scripts/generate-listings.ts

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://www.realtyaivault.com
          NEXT_PUBLIC_ADSENSE_CLIENT: ${{ secrets.ADSENSE_CLIENT }}
          NEXT_PUBLIC_ADSENSE_ENABLED: ${{ secrets.ADSENSE_ENABLED }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.GA_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: realtyaivault
          directory: out
          branch: main
