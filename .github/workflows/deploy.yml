name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        working-directory: ./directory-site
      
      - name: Generate listings from local data
        run: npx tsx scripts/generate-listings.ts
        working-directory: ./directory-site
      
      - name: Build
        run: npm run build
        working-directory: ./directory-site
        env:
          NEXT_PUBLIC_SITE_URL: https://www.realtyaivault.com
          NEXT_PUBLIC_ADSENSE_CLIENT: ${{ secrets.ADSENSE_CLIENT }}
          NEXT_PUBLIC_ADSENSE_ENABLED: ${{ secrets.ADSENSE_ENABLED }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.GA_ID }}
      
      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './directory-site/.next'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
          enable-pull-request-comment: false
          enable-commit-comment: true
          overwrites-pull-request-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 10